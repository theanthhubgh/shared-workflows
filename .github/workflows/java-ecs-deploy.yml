name: Shared Java ECS Deploy
on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      cluster_name:
        required: true
        type: string
    secrets:
      AWS_REGION:
        required: true
      AWS_ROLE_TO_ASSUME:
        required: true
      # MY_ANTH_PAT:
      #   required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # This allows requesting the JWT from GitHub
      contents: read    # This is required for actions/checkout
    steps:
      # 1. Checkout the Application (auth-service)
      - name: Checkout App Code
        uses: actions/checkout@v4

      # 2. Checkout the Shared Repository (to get settings.xml)
      - name: Checkout Shared Resources
        uses: actions/checkout@v4
        with:
          repository: theanthhubgh/shared-workflows
          path: shared-workflows

      # - name: Configure Git for Private Modules
      #   run: |
      #     git config --global url."https://${{ secrets.MY_ANTH_PAT }}@github.com/".insteadOf "https://github.com/"  

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get CodeArtifact Token
        id: codeartifact-token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token --domain anth-dev --domain-owner ${{ vars.AWS_ACCOUNT_ID }} --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: |
          ls shared-workflows/.github -al
          mvn clean package -DskipTests \
            --settings shared-workflows/.github/settings.xml \
            -Dcodeartifact.token=${{ steps.codeartifact-token.outputs.token }}

      - name: Run Tests
        run: mvn test    

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Tagged Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition.json # Ensure this file exists in the app repo
          service: ${{ inputs.service_name }}
          cluster: ${{ inputs.cluster_name }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:${{ github.sha }}